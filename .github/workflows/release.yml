name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set Python 3.11
        run: uv python install 3.11

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#v}"
          proj_version=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag_version" != "$proj_version" ]; then
            echo "::error::tag v$tag_version != pyproject version $proj_version"
            exit 1
          fi
          echo "tag and pyproject agree: $proj_version"

      - name: Build sdist + wheel
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: publish to PyPI (trusted)
    needs: build
    runs-on: ubuntu-latest
    # Required for OIDC-based trusted publishing — no API tokens in the repo.
    # Configure the trusted publisher in PyPI: https://docs.pypi.org/trusted-publishers/
    environment:
      name: pypi
      url: https://pypi.org/project/yugabytedb-mcp-server/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: create GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            dist/*
